{% extends 'plataforma/master.html' %}

{% block title %}Confirmar pedido | ISBEN Solution{% endblock %}

{% block content %}
<section class="container-lg">
    <p class="brand-eyebrow">Confirma compra</p>
    <h1 class="brand-title h2 mb-3">Confirmar pedido</h1>
    <div class="order-progress mb-4" role="progressbar" aria-label="Progreso del pedido" aria-valuenow="3" aria-valuemin="1" aria-valuemax="3">
        <span class="order-progress-fill" style="--order-progress: 100%; --order-progress-start: 0.66666;"></span>
        <span class="visually-hidden">Paso 3 de 3</span>
    </div>
    <div class="brand-card p-4">
        {% include 'plataforma/partials/resumen_pedido.html' %}
        <form class="d-flex flex-wrap justify-content-between gap-2 mt-4" method="post">
            {% csrf_token %}
            <a class="btn btn-outline-brand" href="{% url 'pedido_paso2' %}">Volver al resumen</a>
            <button class="btn btn-brand ms-md-auto" type="submit">Realizar pedido</button>
        </form>
    </div>
</section>
{% endblock %}
