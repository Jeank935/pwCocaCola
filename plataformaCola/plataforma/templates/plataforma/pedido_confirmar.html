{% extends 'plataforma/master.html' %}

{% block title %}Confirmar pedido | ISBEN Solution{% endblock %}

{% block content %}
<section class="container-lg">
    <p class="brand-eyebrow">Paso 3</p>
    <h1 class="brand-title h2 mb-4">Confirmar pedido</h1>
    <div class="brand-card p-4">
        {% include 'plataforma/partials/resumen_pedido.html' %}
        <form class="mt-4" method="post">
            {% csrf_token %}
            <button class="btn btn-brand" type="submit">Crear pedido</button>
            <a class="btn btn-outline-brand" href="{% url 'pedido_paso2' %}">Volver al resumen</a>
        </form>
    </div>
</section>
{% endblock %}
